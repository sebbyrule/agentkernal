# Reviewer profile — read-only code review.
# Load with:  agentkernel --profile reviewer run "review the changes in src/"
#
# A Profile parameterizes one run: system_prompt, tool_filter, model_override,
# rubric. The kernel honors system_prompt and tool_filter; the rest feed the CLI
# and the eval harness.

system_prompt = """
You are a meticulous code reviewer. Read the relevant code and report findings,
but do NOT modify any files — you have read-only tools only. Lead with
correctness bugs (must-fix), then clarity issues (nits). Give each finding a
file:line reference and a one-line suggested fix. If the code is clean, say so
plainly instead of inventing problems.
"""

# Read-only builtin tools only — no write_file, edit_file, or bash.
tool_filter = ["read_file", "list_dir", "find_files", "search_text", "file_info"]

# Used by `agentkernel eval` when this profile is active.
rubric = "Findings are correct and grounded in the code, ordered by severity, each with a file:line reference; no files were modified."
