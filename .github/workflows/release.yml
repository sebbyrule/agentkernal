name: Release

# Publish to PyPI when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Uses PyPI Trusted Publishing (OIDC) — no API token needed. One-time setup:
# on PyPI, add a trusted publisher for project "agentkernel-cli" with owner
# "sebbyrule", repo "agentkernal", workflow "release.yml", environment "pypi".

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
